name: Dependency Audit

on:
  pull_request:
    paths:
      - "requirements.txt"
      - "requirements.lock"
      - "scripts/ci/audit_dependencies.sh"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches: [ main ]
    paths:
      - "requirements.txt"
      - "requirements.lock"
      - "scripts/ci/audit_dependencies.sh"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run dependency audit
        run: ./scripts/ci/audit_dependencies.sh
